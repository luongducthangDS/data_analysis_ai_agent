# Railway deployment configuration — Data Analysis AI Agent
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables — set in Railway dashboard → Variables tab:
# GROQ_API_KEY   required for AI features
# DATA_DIR       optional — set to volume mount path (e.g. /data) for persistent uploads/reports
