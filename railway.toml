# Railway deployment configuration — Data Analysis AI Agent
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
startCommand = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Environment variables required (set in Railway dashboard):
# HF_TOKEN         — HuggingFace token for LLM inference (optional; enables AI insights)
#                    Without it, the app falls back to deterministic template insights.
# REPORT_DIR       — optional, defaults to data/reports/

[[services]]
name = "web"

  [services.variables]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  # DATA_DIR: set to your Railway volume mount path for persistent uploads/reports.
  # If no volume is mounted, uploads and reports are lost on redeploy (stateless mode).
  # DATA_DIR = "/data"
  # Set GROQ_API_KEY in Railway dashboard → Variables tab (required for AI features)
  # GROQ_API_KEY = ""

# Note: this app is stateless per-session (data held in memory).
# For persistence across restarts, mount a Railway volume at /app/data/reports
# so generated reports survive deploys.
